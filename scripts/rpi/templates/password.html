{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Set Device Password</h1>
  <p class="subtitle">Change the default password for this device. You'll need this if you ever SSH into the server.</p>

  <input type="password" id="pw1" placeholder="New password (8+ characters)" class="input" autocomplete="new-password">
  <input type="password" id="pw2" placeholder="Confirm password" class="input" style="margin-top:8px">

  <div id="pw-error" class="error" style="display:none"></div>

  <button onclick="setPassword()" id="pw-btn" class="btn btn-primary btn-block" style="margin-top:20px">
    Set Password
  </button>

  <button onclick="window.location='/keys'" class="btn-link" style="margin-top:12px">
    Skip for now
  </button>
</div>
{% endblock %}
{% block scripts %}
<script>
async function setPassword() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const errorEl = document.getElementById('pw-error');
  const btn = document.getElementById('pw-btn');

  errorEl.style.display = 'none';

  if (pw1.length < 8) {
    errorEl.textContent = 'Password must be at least 8 characters.';
    errorEl.style.display = 'block';
    return;
  }
  if (pw1 !== pw2) {
    errorEl.textContent = 'Passwords do not match.';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Setting...';

  try {
    const res = await fetch('/api/device/set-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw1}),
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/keys';
    } else {
      errorEl.textContent = data.error || 'Failed to set password.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Set Password';
    }
  } catch {
    errorEl.textContent = 'Network error. Try again.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Set Password';
  }
}
</script>
{% endblock %}
