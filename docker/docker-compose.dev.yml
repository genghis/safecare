# Development override — only infrastructure services.
# Run with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Backend and dashboard are run locally via `pnpm dev`.

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  nominatim:
    ports:
      - "8080:8080"

  # Disable application containers in dev mode
  backend:
    profiles:
      - production
  dashboard:
    profiles:
      - production
