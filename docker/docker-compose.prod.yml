# Production override — uses pre-built images from GitHub Container Registry.
# The RPi provisioner uses this instead of building images locally.
#
# Usage:
#   SafeCare only:  docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile safecare up -d
#   RideShare only: docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile rideshare up -d
#   Both:           docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile full up -d
#
# Set SAFECARE_VERSION in .env to pin to a specific release (e.g., 0.4.0).
# Defaults to "latest" if not set.

services:
  backend:
    image: ghcr.io/jasontitus/safecare-backend:${SAFECARE_VERSION:-latest}
    build: !reset null

  dashboard:
    image: ghcr.io/jasontitus/safecare-dashboard:${SAFECARE_VERSION:-latest}
    build: !reset null

  rideshare:
    image: ghcr.io/jasontitus/safecare-rideshare:${SAFECARE_VERSION:-latest}
    build: !reset null

  pwa:
    image: ghcr.io/jasontitus/safecare-pwa:${SAFECARE_VERSION:-latest}
    build: !reset null
