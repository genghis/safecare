services:
  postgres:
    image: postgres:16-alpine
    container_name: safecare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: safecare
      POSTGRES_PASSWORD: safecare
      POSTGRES_DB: safecare
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safecare -d safecare"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: safecare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Self-hosted geocoding (Nominatim with OpenStreetMap data)
  #
  # Default region: US Midwest (~2GB disk, ~1.5GB RAM after import)
  #
  # To change the region, update PBF_URL and REPLICATION_URL below.
  # Regional extracts are available at: https://download.geofabrik.de/
  #
  # Examples:
  #   US Midwest:    https://download.geofabrik.de/north-america/us-midwest-latest.osm.pbf
  #   US South:      https://download.geofabrik.de/north-america/us-south-latest.osm.pbf
  #   US Northeast:  https://download.geofabrik.de/north-america/us-northeast-latest.osm.pbf
  #   US West:       https://download.geofabrik.de/north-america/us-west-latest.osm.pbf
  #   Full US:       https://download.geofabrik.de/north-america/us-latest.osm.pbf (~10GB RAM)
  #   Single state:  https://download.geofabrik.de/north-america/us/illinois-latest.osm.pbf
  #
  # IMPORTANT: If you change the region, delete the nominatim volume first:
  #   docker compose down && docker volume rm docker_nominatimdata
  #   docker compose up -d
  #
  # First start takes 15-60 min (downloads + imports OSM data). Subsequent
  # starts are fast. On Raspberry Pi, first import may take 1-2 hours.
  # ---------------------------------------------------------------------------
  nominatim:
    image: mediagis/nominatim:4.4
    container_name: safecare-nominatim
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      # To download fresh data instead of using local file, replace PBF_PATH
      # with PBF_URL: https://download.geofabrik.de/north-america/us-midwest-latest.osm.pbf
      PBF_PATH: /nominatim/data.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/north-america/us-midwest-updates/
      NOMINATIM_PASSWORD: safecare
      # Low-memory settings for RPi / 8GB machines
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_MAINTENANCE_WORK_MEM: 256MB
      THREADS: 2
    volumes:
      - nominatimdata:/var/lib/postgresql/14/main
      - ./nominatim-data/data.osm.pbf:/nominatim/data.osm.pbf
    shm_size: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # import takes a while on first start

  # ---------------------------------------------------------------------------
  # Self-hosted routing (OSRM — Open Source Routing Machine)
  #
  # Shares the same Midwest PBF file as Nominatim. Pre-processes it on first
  # start into an optimized routing graph (~1GB RAM after processing).
  #
  # First start takes 10-30 min to process the road network. After that,
  # starts in seconds. If you change the PBF region, delete the osrm volume:
  #   docker volume rm docker_osrmdata && docker compose up -d osrm
  # ---------------------------------------------------------------------------
  osrm:
    image: osrm/osrm-backend:latest
    container_name: safecare-osrm
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - osrmdata:/data
      - ./nominatim-data/data.osm.pbf:/osm/data.osm.pbf
      - ./osrm-init.sh:/osrm-init.sh:ro
    entrypoint: ["/bin/bash", "/osrm-init.sh"]
    shm_size: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/nearest/v1/driving/-87.6298,41.8781"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # processing takes a while on first start

  backend:
    build:
      context: ../
      dockerfile: packages/backend/Dockerfile
    container_name: safecare-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://safecare:safecare@postgres:5432/safecare
      REDIS_URL: redis://redis:6379
      GEOCODING_URL: http://nominatim:8080
      OSRM_URL: http://osrm:5000

  dashboard:
    build:
      context: ../
      dockerfile: packages/dashboard/Dockerfile
    container_name: safecare-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      PORT: 3000
      HOSTNAME: "0.0.0.0"

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  nominatimdata:
    driver: local
  osrmdata:
    driver: local
