services:
  postgres:
    image: postgres:16-alpine
    container_name: safecare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: safecare
      POSTGRES_PASSWORD: safecare
      POSTGRES_DB: safecare
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_min_error_statement=PANIC"
      - "-c"
      - "log_min_duration_statement=-1"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safecare -d safecare"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: safecare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Self-hosted geocoding (Nominatim with OpenStreetMap data)
  #
  # Default region: US Midwest (~2GB disk, ~1.5GB RAM after import)
  #
  # To change the region, update PBF_URL and REPLICATION_URL below.
  # Regional extracts are available at: https://download.geofabrik.de/
  #
  # Examples:
  #   US Midwest:    https://download.geofabrik.de/north-america/us-midwest-latest.osm.pbf
  #   US South:      https://download.geofabrik.de/north-america/us-south-latest.osm.pbf
  #   US Northeast:  https://download.geofabrik.de/north-america/us-northeast-latest.osm.pbf
  #   US West:       https://download.geofabrik.de/north-america/us-west-latest.osm.pbf
  #   Full US:       https://download.geofabrik.de/north-america/us-latest.osm.pbf (~10GB RAM)
  #   Single state:  https://download.geofabrik.de/north-america/us/illinois-latest.osm.pbf
  #
  # IMPORTANT: If you change the region, delete the nominatim volume first:
  #   docker compose down && docker volume rm docker_nominatimdata
  #   docker compose up -d
  #
  # First start takes 15-60 min (downloads + imports OSM data). Subsequent
  # starts are fast. On Raspberry Pi, first import may take 1-2 hours.
  # ---------------------------------------------------------------------------
  nominatim:
    image: mediagis/nominatim:4.4
    container_name: safecare-nominatim
    restart: unless-stopped
    ports:
      - "8088:8080"
    entrypoint: ["/bin/bash", "/nominatim-wait.sh"]
    environment:
      PBF_PATH: /nominatim/data.osm.pbf
      NOMINATIM_PASSWORD: safecare
      # TIGER address data is disabled by default -- it imports the entire
      # state's addresses from US Census and takes hours on small hardware.
      # OSM data already has good urban address coverage. Enable only if
      # you need rural house-number geocoding and have 8GB+ RAM:
      # IMPORT_TIGER_ADDRESSES: "true"
      # Low-memory settings for RPi / 8GB machines
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_MAINTENANCE_WORK_MEM: 256MB
      THREADS: 2
    volumes:
      - nominatimdata:/var/lib/postgresql/14/main
      - ./nominatim-data:/nominatim
      - ./nominatim-wait.sh:/nominatim-wait.sh:ro
    shm_size: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # TIGER import adds time

  # ---------------------------------------------------------------------------
  # Self-hosted routing (OSRM — Open Source Routing Machine)
  #
  # Shares the same Midwest PBF file as Nominatim. Pre-processes it on first
  # start into an optimized routing graph (~1GB RAM after processing).
  #
  # First start takes 10-30 min to process the road network. After that,
  # starts in seconds. If you change the PBF region, delete the osrm volume:
  #   docker volume rm docker_osrmdata && docker compose up -d osrm
  # ---------------------------------------------------------------------------
  osrm:
    image: osrm/osrm-backend:v5.27.1
    container_name: safecare-osrm
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - osrmdata:/data
      - ./nominatim-data:/osm
      - ./osrm-init.sh:/osrm-init.sh:ro
    entrypoint: ["/bin/bash", "/osrm-init.sh"]
    shm_size: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/nearest/v1/driving/-87.6298,41.8781"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # processing takes a while on first start

  # ---------------------------------------------------------------------------
  # Signal Messenger (signal-cli REST API)
  #
  # Provides Signal messaging as a notification channel alongside SMS/WhatsApp.
  # Signal requires one-time registration with a phone number:
  #   1. Start the container: docker compose up -d signal
  #   2. Register: POST http://localhost:8089/v1/register/{+1234567890}
  #   3. Verify with the code received: POST http://localhost:8089/v1/register/{+1234567890}/verify/{code}
  #
  # See full docs: https://github.com/bbernhard/signal-cli-rest-api
  # ---------------------------------------------------------------------------
  signal:
    image: bbernhard/signal-cli-rest-api:0.80
    container_name: safecare-signal
    restart: unless-stopped
    ports:
      - "8089:8080"
    environment:
      MODE: normal
    volumes:
      - signaldata:/home/.local/share/signal-cli

  backend:
    build:
      context: ../
      dockerfile: packages/backend/Dockerfile
    container_name: safecare-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    volumes:
      - ./nominatim-data:/app/map-data
    environment:
      DATABASE_URL: postgres://safecare:safecare@postgres:5432/safecare
      REDIS_URL: redis://redis:6379
      GEOCODING_URL: http://nominatim:8080
      OSRM_URL: http://osrm:5000
      SIGNAL_CLI_URL: http://signal:8080

  dashboard:
    build:
      context: ../
      dockerfile: packages/dashboard/Dockerfile
    container_name: safecare-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      PORT: 3000
      HOSTNAME: "0.0.0.0"

  # ---------------------------------------------------------------------------
  # Driver PWA (Progressive Web App)
  # Served as static files. Drivers access via phone browser.
  # ---------------------------------------------------------------------------
  pwa:
    build:
      context: ../
      dockerfile: packages/pwa/Dockerfile
    container_name: safecare-pwa
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  nominatimdata:
    driver: local
  osrmdata:
    driver: local
  signaldata:
    driver: local
